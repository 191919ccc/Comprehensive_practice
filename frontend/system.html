<body data-page="system">
<main class="dash">
    <header class="header">
        <section class="header-title">
            <div class="dot-group"><span class="dot dot-r"></span><span class="dot dot-g"></span><span class="dot dot-b"></span></div>
            <div><h1 class="title-main">系统状态中心</h1><p class="title-sub">Kafka · Spark · MySQL · HDFS</p></div>
        </section>
        <section class="header-status"><span class="live-dot" id="liveDot"></span><span id="streamMode">--</span> | <span id="clock" class="mono">--</span> | <span id="streamState">--</span></section>
    </header>

    <nav class="nav">
        <a href="./index.html">预测大屏</a>

        <a class="active" href="./system.html">系统状态</a>
    </nav>

    <section class="page-hero">
        <div><p class="eyebrow">System Health</p><h2>链路健康与数据源状态</h2><p>展示采集、Kafka、Spark、MySQL 与 HDFS 的运行状态，便于说明实时流处理链路是否稳定闭环。</p></div>
        <div class="status-card"><span class="muted">最新入库</span><strong id="latestEventTime">--</strong><p id="refreshStatus">等待刷新</p></div>
    </section>

    <section class="kpi-grid">
        <article class="kpi" style="--accent:#00a8ff"><div class="kpi-label">近 1 分钟事件</div><div class="kpi-value mono" id="eventsLastMinute">0</div><div class="kpi-note">链路吞吐状态</div></article>
        <article class="kpi" style="--accent:#00e5a0"><div class="kpi-label">监控股票</div><div class="kpi-value mono" id="symbolCount">0</div><div class="kpi-note">数据覆盖范围</div></article>
        <article class="kpi" style="--accent:#ff4d6a"><div class="kpi-label">近 30 分钟告警</div><div class="kpi-value mono" id="alertCount">0</div><div class="kpi-note">运行风险信号</div></article>
        <article class="kpi" style="--accent:#f0a500"><div class="kpi-label">市场均涨跌</div><div class="kpi-value mono" id="avgChange">0%</div><div class="kpi-note" id="marketBreadth">上涨 0 / 下跌 0</div></article>
    </section>

    <section class="layout-even">
        <article class="panel"><div class="panel-header"><div class="panel-title"><span class="panel-title-dot"></span>系统健康</div></div><div id="healthList" class="list"></div></article>
        <article class="panel"><div class="panel-header"><div class="panel-title"><span class="panel-title-dot" style="background:#00e5a0"></span>数据源状态</div></div><div id="sourceList" class="list"></div></article>
    </section>
</main>
